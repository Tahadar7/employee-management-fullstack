<nav class="navbar">
  <div class="logo">EmployeeApp</div>

 <ul class="nav-links" [class.active]="menuOpen()">
  @if (isAuthenticated()) {
    <li><a routerLink="/dashboard" routerLinkActive="active-link" (click)="closeMenu()">Dashboard</a></li>

    @if (isAdmin()) {
      <li><a routerLink="/add-employee" routerLinkActive="active-link" (click)="closeMenu()">Add Employee</a></li>
    }

    <li class="role-badge">{{ role() }}</li>
    <li><button class="logout-btn" (click)="askLogout()">Logout</button></li>
  } @else {
    <li><a routerLink="/login" routerLinkActive="active-link" (click)="closeMenu()">Login</a></li>
    <li><a routerLink="/register" routerLinkActive="active-link" (click)="closeMenu()">Register</a></li>
  }
</ul>

  <div class="menu-toggle" (click)="toggleMenu()">☰</div>
</nav>

@if (showLogoutConfirm()) {
  <app-confirm-dialog
    title="Log out?"
    message="You will need to log in again to access your account."
    confirmText="Logout"
    cancelText="Cancel"
    (confirmed)="confirmLogout()"
    (cancelled)="cancelLogout()"
  />
}

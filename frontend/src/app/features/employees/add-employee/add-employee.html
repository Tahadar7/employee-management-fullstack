<div class="form-container">
  <form class="employee-form" [formGroup]="form" (ngSubmit)="onAddEmployee()">
    <h2>Add Employee</h2>

    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" formControlName="name" placeholder="Enter name" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="field-error">Name is required.</small>
      }
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="Enter email" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="field-error">A valid email is required.</small>
      }
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="text" id="phone" formControlName="phone" placeholder="Enter phone number" />
    </div>

    <div class="form-group">
      <label for="city">City</label>
      <input type="text" id="city" formControlName="city" placeholder="Enter city" />
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-btn" [disabled]="isLoading()">
        {{ isLoading() ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" class="cancel-btn" (click)="form.reset()">Clear</button>
    </div>
  </form>
</div>
